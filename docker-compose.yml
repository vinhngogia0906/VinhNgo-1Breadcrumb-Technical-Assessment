services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-librarydb}
      POSTGRES_USER: ${POSTGRES_USER:-library}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-library}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-librarydb};Username=${POSTGRES_USER:-library};Password=${POSTGRES_PASSWORD:-library}"
      Jwt__Issuer: ${JWT_ISSUER:-LibraryApi}
      Jwt__Audience: ${JWT_AUDIENCE:-LibraryApiClient}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-change-me-in-production-please-32-chars-min}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-480}
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN:-http://localhost:8080}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-5000}:8080"

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
